<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Static‐Site Deploy Test</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; }
    .timestamp { color: #555; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>🚀 Deploy Test Successful!</h1>
  <p class="timestamp">Page rendered at: <span id="time"></span></p>

  <script>
    // Display current time so you know the file was freshly pulled
    document.getElementById('time').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
